name: Tests Pytest

on:
  push:
    paths:
      - "atelier-pytest/**"
      - ".github/workflows/test-pytest.yml"
  pull_request:
    paths:
      - "atelier-pytest/**"
      - ".github/workflows/test-pytest.yml"

jobs:
  test:
    name: Lancer pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atelier-pytest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: atelier-pytest/requirements.txt

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: pytest -v
