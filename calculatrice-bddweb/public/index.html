<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculatrice avec BDD</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Calculatrice</h1>
      <p class="subtitle">Historique enregistré en base de données</p>

      <form id="form" autocomplete="off">
        <label>
          <span>a</span>
          <input type="number" id="a" step="any" value="5" required />
        </label>

        <label>
          <span>b</span>
          <input type="number" id="b" step="any" value="3" />
        </label>

        <label>
          <span>Opération</span>
          <select id="op">
            <option value="add">Addition</option>
            <option value="sub">Soustraction</option>
            <option value="mul">Multiplication</option>
            <option value="div">Division</option>
            <option value="pow">Puissance</option>
            <option value="mod">Modulo</option>
            <option value="pct">Pourcentage</option>
            <option value="sqrt">Racine carrée</option>
          </select>
        </label>

        <button type="submit">Calculer</button>
      </form>

      <section id="resultat" class="resultat" aria-live="polite"></section>

      <section class="historique">
        <div class="historique-entete">
          <h2>Historique</h2>
          <button type="button" id="btn-vider" class="btn-vider">Vider</button>
        </div>
        <table id="table-historique">
          <thead>
            <tr>
              <th>#</th>
              <th>Opération</th>
              <th>a</th>
              <th>b</th>
              <th>Résultat</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="corps-historique"></tbody>
        </table>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
